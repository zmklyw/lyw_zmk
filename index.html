<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmk&Lyw恋爱日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #fef7f9;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(230, 73, 128, 0.1);
        }
        .header h1 {
            font-size: 28px;
            color: #e64980;
            margin-bottom: 10px;
        }
        .timer-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(230, 73, 128, 0.1);
        }
        .timer-title {
            font-size: 18px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        .timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #e64980;
            margin-bottom: 12px;
        }
        .event-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(230, 73, 128, 0.1);
        }
        .event-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            border-left: 4px solid #e64980;
            padding-left: 12px;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .photo-item {
            border-radius: 8px;
            overflow: hidden;
            background: #f8f9fa;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .section-title {
            font-size: 22px;
            font-weight: 600;
            color: #e64980;
            margin: 30px 0 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Zmk&Lyw恋爱日记 💌</h1>
        <p>记录我们从相识到相伴的每一个珍贵瞬间</p >
    </div>

    <!-- 1. 相识计时 -->
    <div class="timer-card">
        <div class="timer-title">我们相识啦：</div>
        <div class="timer-display" id="meetTimer">0天 0时 0分 0秒</div>
        <div class="photo-grid">
            <div class="photo-item">
                < img src="https://s3.bmp.ovh/2026/03/07/ceCEKj91.jpg" alt="相识照片">
            </div>
        </div>
    </div>

    <!-- 2. 相遇计时 -->
    <div class="timer-card">
        <div class="timer-title">我们相遇啦：</div>
        <div class="timer-display" id="togetherTimer">0天 0时 0分 0秒</div>
        <div class="photo-grid">
            <div class="photo-item">
                < img src="https://s3.bmp.ovh/2026/03/07/7AAEgobP.png" alt="相遇照片">
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // 🌟 核心修改区：所有时间都在这里改！
        // 格式："YYYY-MM-DD HH:MM:SS" （年-月-日 时:分:秒）
        // ==============================================

        // 1. 我们相识的时间（到秒）
        const MEET_DATE = "2024-12-17 16:45:00";

        // 2. 我们相遇的时间（到秒）
        const TOGETHER_DATE = "2025-02-20 12:11:00";

        // ==============================================
        // 👇 下面的代码不用改，是用来计算时间的
        // ==============================================

        // 计算通用时长（天、时、分、秒）
        function calcTime(start) {
            if (!start) return "0天 0时 0分 0秒";
            const startDate = new Date(start);
            const now = new Date();
            const diff = now - startDate;
            if (diff < 0) return "0天 0时 0分 0秒";
            
            const seconds = Math.floor(diff / 1000) % 60;
            const minutes = Math.floor(diff / (1000 * 60)) % 60;
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            return `${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }

        // 更新所有计时器
        function updateAllTimers() {
            document.getElementById("meetTimer").textContent = calcTime(MEET_DATE);
            document.getElementById("togetherTimer").textContent = calcTime(TOGETHER_DATE);
        }

        // 每秒更新一次
        setInterval(updateAllTimers, 1000);
        updateAllTimers();
    </script>
</body>
</html>
