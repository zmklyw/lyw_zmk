    <script>
        // ==============================================
        // 🌟 核心修改区：所有时间都在这里改！
        // 格式："YYYY-MM-DD HH:MM:SS" （年-月-日 时:分:秒）
        // ==============================================

        // 1. 我们相识的时间（到秒）
        const MEET_DATE = "2024-12-17 16:45:00";

        // 2. 我们相遇的时间（到秒）
        const TOGETHER_DATE = "2025-02-20 12:11:00";

        // 3. 我们住在一起的时间（到秒）
        const LIVE_TOGETHER_DATE = "2025-09-09 12:00:00";

        // 4. 我们结婚的时间（到秒）
        const MARRY_DATE = "2026-10-01 11:00:00";

        // 5. 宝宝出生的时间（到秒），宝宝出生后再填
        const BABY_BIRTH_DATE = "";

        // ==============================================
        // 👇 下面的代码不用改，是用来计算时间的
        // ==============================================

        // 计算通用时长（天、时、分、秒）
        function calcTime(start) {
            if (!start) return "0天 0时 0分 0秒";
            const startDate = new Date(start);
            const now = new Date();
            const diff = now - startDate;
            if (diff < 0) return "0天 0时 0分 0秒";
            
            const seconds = Math.floor(diff / 1000) % 60;
            const minutes = Math.floor(diff / (1000 * 60)) % 60;
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            return `${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }

        // 计算宝宝年龄（岁、月、天）
        function calcBabyAge() {
            if (!BABY_BIRTH_DATE) return "0岁 0个月 0天";
            const birth = new Date(BABY_BIRTH_DATE);
            const now = new Date();
            
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            
            if (days < 0) {
                months -= 1;
                const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years -= 1;
                months += 12;
            }
            
            return `${years}岁 ${months}个月 ${days}天`;
        }

        // 更新所有计时器
        function updateAllTimers() {
            document.getElementById("meetTimer").textContent = calcTime(MEET_DATE);
            document.getElementById("togetherTimer").textContent = calcTime(TOGETHER_DATE);
            document.getElementById("liveTogetherTimer").textContent = calcTime(LIVE_TOGETHER_DATE);
            document.getElementById("marryTimer").textContent = calcTime(MARRY_DATE);
            document.getElementById("babyTimer").textContent = calcBabyAge();
        }

        // 每秒更新一次
        setInterval(updateAllTimers, 1000);
        updateAllTimers();
    </script>
