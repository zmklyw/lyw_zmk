<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmk&Lyw恋爱日记</title>
    <style>
        body {
            font-family: 'Microsoft Yahei', sans-serif;
            background: #fce4ec;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #e91e63;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .timer-card {
            margin-bottom: 40px;
            padding: 20px;
            border-left: 4px solid #e91e63;
            background: #fafafa;
            border-radius: 8px;
        }
        .timer-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        .timer-display {
            font-size: 28px;
            color: #e91e63;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .photo-item img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zmk&Lyw恋爱日记 💌</h1>
        <p class="subtitle">记录我们从相识到相伴的每一个珍贵瞬间</p >

        <!-- 相识计时 -->
        <div class="timer-card">
            <div class="timer-title">我们相识啦：</div>
            <div class="timer-display" id="meetTimer">0天 0时 0分 0秒</div>
            <div class="photo-item">
                <!-- 把这里的文件名换成你上传的第一张照片 -->
                < img src="e8b763493320fc227e5224b9a8c6ea73" alt="相识照片">
            </div>
        </div>

        <!-- 相遇计时 -->
        <div class="timer-card">
            <div class="timer-title">我们相遇啦：</div>
            <div class="timer-display" id="togetherTimer">0天 0时 0分 0秒</div>
            <div class="photo-item">
                <!-- 把这里的文件名换成你上传的第二张照片 -->
                < img src="xiangyu.jpg" alt="相遇照片">
            </div>
        </div>
    </div>

    <script>
        // 请修改为你们的真实日期
        const meetDate = new Date('2025-01-01 00:00:00'); // 相识日期
        const togetherDate = new Date('2025-02-15 00:00:00'); // 相遇/在一起日期

        function updateTimer() {
            const now = new Date();
            updateSingleTimer(meetDate, 'meetTimer');
            updateSingleTimer(togetherDate, 'togetherTimer');
        }

        function updateSingleTimer(targetDate, elementId) {
            const now = new Date();
            const diff = now - targetDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById(elementId).textContent = 
                `${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
